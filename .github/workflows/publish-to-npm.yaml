name: Release

on: [push]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare repository
        run: git fetch --unshallow --tags

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Release changed packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          for pkg in packages/*/; do
            pkg=${pkg%/}
            pkg_name=$(basename "$pkg")

            # Skip if no release script
            if [ ! -f "$pkg/package.json" ] || ! grep -q '"release"' "$pkg/package.json"; then
              echo "Skipping $pkg_name (no release script)"
              continue
            fi

            # Check if package has changed since last tag (or always release if no tag exists)
            if [ -z "$LAST_TAG" ]; then
              changed=true
            else
              changed=$(git diff --name-only "$LAST_TAG" HEAD -- "$pkg/" | grep -q . && echo true || echo false)
            fi

            if [ "$changed" = "true" ]; then
              echo "Releasing $pkg_name..."
              (cd "$pkg" && pnpm run release)
            else
              echo "Skipping $pkg_name (no changes since $LAST_TAG)"
            fi
          done