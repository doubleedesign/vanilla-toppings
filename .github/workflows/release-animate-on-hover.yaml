name: Release animate-on-hover

on:
  push:
    branches:
      - master
    paths:
      - 'packages/animate-on-hover/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          gh release create "animate-on-hover@$(node -p "require('./packages/animate-on-hover/package.json').version")" \
            --title "animate-on-hover@$(node -p "require('./packages/animate-on-hover/package.json').version")" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        working-directory: packages/animate-on-hover
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}