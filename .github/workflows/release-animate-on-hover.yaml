name: Release animate-on-hover

on:
  push:
    branches:
      - master
    paths:
      - 'packages/animate-on-hover/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        working-directory: packages/animate-on-hover
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: packages/animate-on-hover

  publish-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          gh release create "animate-on-hover@$(node -p "require('./packages/animate-on-hover/package.json').version")" \
            --title "animate-on-hover@$(node -p "require('./packages/animate-on-hover/package.json').version")" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: packages/animate-on-hover
      - run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        working-directory: packages/animate-on-hover
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}